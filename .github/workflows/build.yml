name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v3
        with:
          name: HabitFlow-APK
          path: app/build/outputs/apk/release/*.apk
